<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPAG</title>
    <link rel="icon" type="image/webp" href="assets/CHED-Logo.webp" />
    <link rel="stylesheet" href="styles.css?v=20260321-3" />
    <link rel="stylesheet" href="header/header.css?v=20260321-3" />
    <link rel="stylesheet" href="footer/footer.css?v=20260321-3" />
    <script
      type="module"
      src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.7.2/dist/dotlottie-wc.js"
    ></script>
    <!-- Module entry for login interactions -->
    <script type="module" src="./main.js"></script>
  </head>
  <body class="login-page">
    <main class="shell">
      <div id="header-container"></div>

      <section class="panel" id="login-panel">
        <div class="login-panel-intro">
          <div class="login-panel-brand" aria-hidden="true">
            <img
              src="assets/CHED-Logo.webp"
              alt="CHED logo"
              class="login-panel-brand-logo"
            />
            <img
              src="assets/Bagong_Pilipinas_logo.webp"
              alt="Bagong Pilipinas logo"
              class="login-panel-brand-logo login-panel-brand-logo--secondary"
            />
          </div>
          <p class="login-panel-subtitle">
            Use your work account credentials to continue.
          </p>
        </div>
        <div class="fields">
          <div>
            <label for="email"
              >Email address <span class="required">*</span></label
            >
            <div class="input-wrap">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <path
                    d="M12 12.2c2.4 0 4.4-2 4.4-4.4S14.4 3.4 12 3.4 7.6 5.4 7.6 7.8s2 4.4 4.4 4.4Zm0 2.2c-3.4 0-8.2 1.7-8.2 5.1v1.1h16.4v-1.1c0-3.4-4.8-5.1-8.2-5.1Z"
                  />
                </svg>
              </span>
              <input
                id="email"
                type="email"
                autocomplete="email"
                placeholder="email"
              />
            </div>
          </div>
          <div>
            <div class="login-field-head">
              <label for="password"
                >Password <span class="required">*</span></label
              >
            </div>
            <div class="input-wrap input-wrap--password">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <path
                    d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2Zm-7-2a2 2 0 0 1 4 0v2h-4V7Z"
                  />
                </svg>
              </span>
              <input
                id="password"
                type="password"
                autocomplete="current-password"
                placeholder="password"
              />
              <button
                id="toggle-password-btn"
                class="password-visibility-btn"
                type="button"
                aria-label="Show password"
                aria-pressed="false"
              >
                <svg
                  viewBox="0 0 24 24"
                  role="img"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path
                    d="M12 5c5.23 0 9.27 4.11 10 7-.73 2.89-4.77 7-10 7S2.73 14.89 2 12c.73-2.89 4.77-7 10-7Zm0 2c-3.8 0-6.87 2.69-7.84 5 .97 2.31 4.04 5 7.84 5s6.87-2.69 7.84-5c-.97-2.31-4.04-5-7.84-5Zm0 2.25A2.75 2.75 0 1 1 9.25 12 2.76 2.76 0 0 1 12 9.25Zm0 2A.75.75 0 1 0 12.75 12 .75.75 0 0 0 12 11.25Z"
                  />
                </svg>
              </button>
            </div>
          </div>
          <div class="login-utility-row">
            <p class="login-utility-note">
              Use your assigned account credentials to continue.
            </p>
          </div>
        </div>
        <div class="login-actions">
          <button id="login-btn" type="button">
            <span id="login-btn-text">Sign in</span>
            <dotlottie-wc
              id="login-btn-lottie"
              src="assets/load.lottie"
              autoplay
              loop
            ></dotlottie-wc>
          </button>
          <span class="status status--neutral hidden" id="login-status"
            >Enter your credentials.</span
          >
        </div>
      </section>
    </main>

    <!-- placeholder: remove this block in next cleanup pass -->

    <script>
      const headerFallbackHtml = `
        <header class="login-hero-header">
          <div class="login-header-bar">
            <p class="login-header-kicker">CHEDRO IV</p>
          </div>
          <div class="login-header-copy">
            <h1>COS Payslip Generator</h1>
          </div>
        </header>
      `;

      fetch("header/login-header.html?v=20260321-2")
        .then((response) => {
          if (!response.ok) {
            throw new Error(`Header partial request failed with ${response.status}`);
          }
          return response.text();
        })
        .then((data) => {
          document.getElementById("header-container").innerHTML = data;
        })
        .catch((error) => {
          console.warn("Falling back to inline header:", error);
          document.getElementById("header-container").innerHTML = headerFallbackHtml;
        });
    </script>

    <div id="footer-container"></div>
    <script>
      const footerFallbackHtml = `
        <footer class="gov-footer">
          <div class="footer-content">
            <div class="footer-links" aria-label="Official links">
              <a href="https://ched.gov.ph/" target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2Zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93Zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41C17.92 5.77 20 8.65 20 12c0 2.08-.81 3.98-2.1 5.39Z"/></svg>
                CHED Website
              </a>
              <a href="https://www.facebook.com/ched4" target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.99 3.66 9.13 8.44 9.88v-6.99H7.9V12h2.54V9.8c0-2.51 1.49-3.89 3.78-3.89 1.09 0 2.23.19 2.23.19v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.77l-.44 2.89h-2.33v6.99C18.34 21.13 22 16.99 22 12Z"/></svg>
                CHEDRO IV Facebook
              </a>
            </div>
            <div class="footer-note">
              <p class="footer-copyright"><span id="footer-year"></span> &middot; Commission on Higher Education Regional Office IV</p>
            </div>
          </div>
        </footer>
      `;

      fetch("footer/footer.html?v=20260321-1")
        .then((response) => {
          if (!response.ok) {
            throw new Error(`Footer partial request failed with ${response.status}`);
          }
          return response.text();
        })
        .then((data) => {
          const footerHTML = data.replace(/FOOTER_ASSETS_PATH/g, "assets");
          document.getElementById("footer-container").innerHTML = footerHTML;
          const fy = document.getElementById("footer-year");
          if (fy) fy.textContent = new Date().getFullYear();
        })
        .catch((error) => {
          console.warn("Falling back to inline footer:", error);
          document.getElementById("footer-container").innerHTML = footerFallbackHtml;
          const fy = document.getElementById("footer-year");
          if (fy) fy.textContent = new Date().getFullYear();
        });
    </script>
  </body>
</html>
